name: Security Scanning Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  static-analysis:
    runs-on: ubuntu-latest
    name: Static Security Analysis

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Kubesec
      run: |
        curl -sSL https://github.com/controlplaneio/kubesec/releases/download/v2.13.0/kubesec_linux_amd64.tar.gz \
          | tar xz kubesec
        sudo mv kubesec /usr/local/bin/
        kubesec version

    - name: Install KubeLinter
      run: |
        curl -sSL https://github.com/stackrox/kube-linter/releases/download/v0.6.8/kube-linter-linux.tar.gz \
          | tar xz
        sudo mv kube-linter /usr/local/bin/
        kube-linter version

    - name: Install Trivy
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y wget apt-transport-https gnupg lsb-release
        wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
        echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" \
          | sudo tee /etc/apt/sources.list.d/trivy.list
        sudo apt-get update -qq
        sudo apt-get install -y trivy
        trivy --version

    - name: Run Kubesec Analysis
      run: |
        mkdir -p reports
        echo "Running Kubesec analysis..."
        GATE_FAILED=false

        for file in manifests/secure-app.yaml; do
          if [ -f "$file" ]; then
            name=$(basename "$file" .yaml)
            echo "  Scanning $name..."
            kubesec scan "$file" > "reports/kubesec-${name}.json" || true
            score=$(jq -r '[.[] | select(.object | startswith("Deployment"))] | .[0].score // "N/A"' "reports/kubesec-${name}.json")
            echo "  Deployment score for $name: $score"
            if [ "$score" != "N/A" ] && [ "$score" -lt 0 ]; then
              echo "::error::$name deployment has a negative security score: $score"
              GATE_FAILED=true
            fi
          fi
        done

        if [ "$GATE_FAILED" = true ]; then
          echo "Kubesec gate failed - negative scores detected"
          exit 1
        fi

    - name: Run KubeLinter Analysis
      run: |
        echo "Running KubeLinter analysis..."
        kube-linter lint manifests/ --format json > reports/kubelinter-report.json || true
        issues=$(jq '.Issues | length' reports/kubelinter-report.json 2>/dev/null || echo "0")
        echo "KubeLinter found $issues issues"
        if [ "$issues" -gt 0 ]; then
          echo "::warning::KubeLinter found $issues security issues"
          jq -r '.Issues[] | "  - \(.Object.K8sObject.Name): \(.Message)"' reports/kubelinter-report.json
        fi

    - name: Build App Image
      run: |
        echo "Building secure-demo-app image..."
        docker build -t secure-demo-app:1.0.0 ./app
        docker images | grep secure-demo-app

    - name: Scan Container Images with Trivy
      run: |
        echo "Scanning container images..."
        mkdir -p reports
        GATE_FAILED=false

        # Scan our custom built image
        echo "Scanning: secure-demo-app:1.0.0"
        trivy image --format json --output "reports/trivy-secure-demo-app.json" secure-demo-app:1.0.0 || true

        if [ -f "reports/trivy-secure-demo-app.json" ]; then
          critical=$(jq '[.Results[]?.Vulnerabilities // [] | .[] | select(.Severity=="CRITICAL")] | length' reports/trivy-secure-demo-app.json)
          high=$(jq '[.Results[]?.Vulnerabilities // [] | .[] | select(.Severity=="HIGH")] | length' reports/trivy-secure-demo-app.json)
          echo "  secure-demo-app:1.0.0 → CRITICAL: $critical, HIGH: $high"
          if [ "$critical" -gt 0 ]; then
            echo "::warning::secure-demo-app has $critical CRITICAL vulnerabilities"
          fi
          if [ "$high" -gt 10 ]; then
            echo "::error::secure-demo-app has $high HIGH vulnerabilities (threshold: 10)"
            GATE_FAILED=true
          fi
        fi

        if [ "$GATE_FAILED" = true ]; then
          exit 1
        fi

    - name: Upload Security Reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: security-reports
        path: reports/
        retention-days: 30

    - name: Security Gate Summary
      if: always()
      run: |
        echo "=============================="
        echo "   Security Gate Summary"
        echo "=============================="
        for file in reports/kubesec-*.json; do
          [ -f "$file" ] || continue
          name=$(basename "$file" .json)
          score=$(jq -r '[.[] | select(.object | startswith("Deployment"))] | .[0].score // "N/A"' "$file")
          echo "Kubesec | $name | score: $score"
        done
        for file in reports/trivy-*.json; do
          [ -f "$file" ] || continue
          name=$(basename "$file" .json)
          critical=$(jq '[.Results[]?.Vulnerabilities // [] | .[] | select(.Severity=="CRITICAL")] | length' "$file")
          high=$(jq '[.Results[]?.Vulnerabilities // [] | .[] | select(.Severity=="HIGH")] | length' "$file")
          echo "Trivy   | $name | CRITICAL: $critical HIGH: $high"
        done
        echo "=============================="
